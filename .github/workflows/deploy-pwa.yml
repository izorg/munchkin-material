name: Deploy App

on:
  push:
    tags:
      - v*

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
          node-version-file: ".nvmrc"

      - name: Install ⬇️
        env:
          HUSKY: 0
        run: |
          npm install -g corepack
          yarn install --immutable

      - name: Compile locales 🔨
        run: yarn workspace @munchkin/web run i18n:compile

      - name: Get app version
        run: echo "VERSION=$(yarn run get-version)" >> $GITHUB_ENV

      - name: Check
        run: yarn check

      - name: Test
        run: yarn workspaces foreach --all run test

      - name: Build 🔨
        run: yarn workspaces foreach --from '@munchkin/{cordova,pwa}' --parallel --recursive run build

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          release: ${{ format('munchkin@{0}', env.VERSION) }}
          sourcemaps: "./packages/cordova/www ./packages/pwa/dist"

      - name: Deploy 🚀
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          channelId: live
          entryPoint: packages/pwa
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IZORG_MUNCHKIN }}
          projectId: izorg-munchkin
          repoToken: ${{ secrets.GITHUB_TOKEN }}
